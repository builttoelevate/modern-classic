name: Deploy preview to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      DEPLOY_TARGET: gh-pages
      GH_OWNER: ${{ github.repository_owner }}
      GH_REPO: ${{ github.event.repository.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Strip Vercel-only routes
        # The /book wizard, /admin dashboard, /sign-in + /my-bookings +
        # /auth customer portal, and /api/* endpoints all require SSR
        # plus secrets at request time — none of that works on GitHub
        # Pages. The live experience is on Vercel; this preview only
        # hosts the marketing pages.
        run: |
          rm -rf src/pages/api
          rm -rf src/pages/admin
          rm -rf src/pages/auth
          rm -f  src/pages/book.astro
          rm -f  src/pages/sign-in.astro
          rm -f  src/pages/my-bookings.astro

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
